services:
  - type: web
    name: data-gov-il-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: MCP_TRANSPORT
        value: streamable-http
      - key: MCP_HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: "3.11"
